#####################################################################
# chamber_control.cfg
#
# Passive chamber temperature control for Voron / Klipper
# Uses:
#   - bed fans        -> move bed heat into chamber
#   - Nevermore       -> recirculate/filter chamber air
#   - exhaust fan     -> dump excess heat
#
# IMPORTANT:
# - This does NOT create heat by itself.
# - It only manages heat already produced by the printer.
# - You must replace the FAN PINS below with your actual pins.
# - If you already have these fans configured elsewhere, do not duplicate
#   the fan sections; keep only the macros + delayed_gcode section.
#####################################################################


#####################################################################
# FAN DEFINITIONS
# Replace the pins below with your actual hardware pins.
#####################################################################

# [fan_generic BedFans]
# pin: PA1
# max_power: 1.0
# shutdown_speed: 0.0
# kick_start_time: 0.5

# [fan_generic Nevermore]
# pin: PA2
# max_power: 1.0
# shutdown_speed: 0.0
# kick_start_time: 0.5

# [fan_generic exhaust_fan]
# pin: PA3
# max_power: 1.0
# shutdown_speed: 0.0
# kick_start_time: 0.5


#####################################################################
# CHAMBER CONTROL MACRO
#####################################################################

[gcode_macro CHAMBER_CONTROL]
description: Enable passive chamber control and auto-heat bed if needed
variable_enabled: 0
variable_target: 45.0
variable_band: 1.0
variable_poll: 2.0
variable_bedtemp: 110
gcode:
  {% set target = params.TARGET|default(50)|float %}
  {% set band = params.BAND|default(1.0)|float %}
  {% set bedtemp = params.BEDTEMP|default(110)|float %}

  {% if target < 20 or target > 70 %}
    {action_raise_error("TARGET must be between 20C and 70C")}
  {% endif %}

  SET_GCODE_VARIABLE MACRO=CHAMBER_CONTROL VARIABLE=target VALUE={target}
  SET_GCODE_VARIABLE MACRO=CHAMBER_CONTROL VARIABLE=band VALUE={band}
  SET_GCODE_VARIABLE MACRO=CHAMBER_CONTROL VARIABLE=bedtemp VALUE={bedtemp}
  SET_GCODE_VARIABLE MACRO=CHAMBER_CONTROL VARIABLE=enabled VALUE=1

  {% if printer.heater_bed.target|float < bedtemp %}
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={bedtemp}
  {% endif %}

  UPDATE_DELAYED_GCODE ID=chamber_control_loop DURATION=1
  {action_respond_info("Chamber control enabled: target=" ~ target ~ "C, bed=" ~ bedtemp ~ "C")}

[gcode_macro CHAMBER_CONTROL_OFF]
description: Disable passive chamber temp controller and turn all chamber fans off
gcode:
  SET_GCODE_VARIABLE MACRO=CHAMBER_CONTROL VARIABLE=enabled VALUE=0
  UPDATE_DELAYED_GCODE ID=chamber_control_loop DURATION=0
  SET_FAN_SPEED FAN=BedFans SPEED=0.0
  SET_FAN_SPEED FAN=Nevermore SPEED=0.0
  SET_FAN_SPEED FAN=exhaust_fan SPEED=0.0
  RESPOND MSG="Chamber control disabled"

[gcode_macro CHAMBER_CONTROL_STATUS]
description: Report chamber control state
gcode:
  {% set ctrl = printer["gcode_macro CHAMBER_CONTROL"] %}
  {% set chamber = printer["temperature_sensor chamber"].temperature|float %}
  RESPOND MSG="enabled={ctrl.enabled} target={ctrl.target}C chamber={chamber}C band={ctrl.band}C"

[gcode_macro CHAMBER_SOAK]
description: Auto-heat bed, enable chamber control, and wait for chamber target
gcode:
  {% set target = params.TARGET|default(50)|float %}
  {% set bedtemp = params.BEDTEMP|default(110)|float %}

  CHAMBER_CONTROL TARGET={target} BEDTEMP={bedtemp}
  TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bedtemp}
  TEMPERATURE_WAIT SENSOR="temperature_sensor chamber" MINIMUM={target}
  {action_respond_info("Chamber reached " ~ target ~ "C")}

#####################################################################
# REPEATING CONTROL LOOP
#####################################################################

[delayed_gcode chamber_control_loop]
gcode:
  {% set ctrl = printer["gcode_macro CHAMBER_CONTROL"] %}
  {% if ctrl.enabled|int == 1 %}
    {% set target = ctrl.target|float %}
    {% set band = ctrl.band|float %}
    {% set poll = ctrl.poll|float %}
    {% set chamber = printer["temperature_sensor chamber"].temperature|float %}

    {% if chamber < (target - band) %}
      SET_FAN_SPEED FAN=BedFans SPEED=1.0
      SET_FAN_SPEED FAN=Nevermore SPEED=1.0
      SET_FAN_SPEED FAN=exhaust_fan SPEED=0.0

    {% elif chamber <= (target + band) %}
      SET_FAN_SPEED FAN=BedFans SPEED=0.30
      SET_FAN_SPEED FAN=Nevermore SPEED=0.45
      SET_FAN_SPEED FAN=exhaust_fan SPEED=0.0

    {% else %}
      {% set over = chamber - (target + band) %}
      {% set exhaust = over / 5.0 %}
      {% if exhaust < 0.20 %}{% set exhaust = 0.20 %}{% endif %}
      {% if exhaust > 1.00 %}{% set exhaust = 1.00 %}{% endif %}

      SET_FAN_SPEED FAN=BedFans SPEED=0.0
      SET_FAN_SPEED FAN=Nevermore SPEED=0.20
      SET_FAN_SPEED FAN=exhaust_fan SPEED={exhaust}
    {% endif %}

    UPDATE_DELAYED_GCODE ID=chamber_control_loop DURATION={poll}
  {% endif %}